name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.1'

    - name: Injetar Manifesto Limpo (Seguro)
      run: |
        mkdir -p app/src/main
        echo "" | base64 -d > app/src/main/AndroidManifest.xml

    - name: Build App
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: jn-som-player-apk
        path: app/build/outputs/apk/debug/app-debug.apk
