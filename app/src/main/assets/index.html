<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>JN Som Player</title>
<style>
  :root{
    --bg:#0a0a0a; --bg2:#111; --card:#161616; --line:#222;
    --txt:#f5f5f5; --mut:#9a9a9a; --acc:#ff2d55;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:var(--bg);color:var(--txt);font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif}
  a{color:inherit;text-decoration:none}
  header{position:sticky;top:0;z-index:50;background:rgba(10,10,10,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;gap:14px;padding:12px 20px;max-width:1400px;margin:0 auto}
  .logo{font-weight:800;letter-spacing:.5px;font-size:20px}
  .logo span{color:var(--acc)}
  .search{flex:1;max-width:720px;margin:0 auto;position:relative;display:flex;gap:8px}
  .search input{flex:1;background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:11px 16px;border-radius:999px;outline:none;font-size:14px}
  .search input:focus{border-color:var(--acc)}
  .search button{background:var(--bg2);border:1px solid var(--line);color:var(--txt);width:44px;height:44px;border-radius:50%;cursor:pointer;display:grid;place-items:center}
  .search button:hover{border-color:var(--acc);color:var(--acc)}
  .suggest{position:absolute;top:50px;left:0;right:52px;background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden;display:none;z-index:60}
  .suggest div{padding:10px 16px;cursor:pointer;font-size:14px}
  .suggest div:hover{background:#222}

  .chips{display:flex;gap:8px;overflow-x:auto;padding:14px 20px;max-width:1400px;margin:0 auto;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto;background:var(--bg2);border:1px solid var(--line);padding:8px 14px;border-radius:999px;font-size:13px;cursor:pointer;white-space:nowrap}
  .chip.active,.chip:hover{background:#fff;color:#000;border-color:#fff}

  main{max-width:1400px;margin:0 auto;padding:10px 20px 60px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
  .card{cursor:pointer;background:transparent;border-radius:14px;overflow:hidden;transition:transform .2s}
  .card:hover{transform:translateY(-3px)}
  .thumb{position:relative;aspect-ratio:16/9;background:#000;border-radius:14px;overflow:hidden}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .meta{padding:10px 4px}
  .title{font-size:14px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .sub{color:var(--mut);font-size:12px;margin-top:4px}

  /* Player */
  .player-wrap{display:grid;grid-template-columns:1fr 360px;gap:24px;margin-top:8px}
  @media(max-width:980px){.player-wrap{grid-template-columns:1fr}}
  .yt{aspect-ratio:16/9;width:100%;background:#000;border-radius:14px;overflow:hidden;position:relative}
  .yt iframe{width:100%;height:100%;border:0}
  .v-title{font-size:20px;font-weight:700;margin:14px 0 6px}
  .v-sub{color:var(--mut);font-size:13px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .actions{display:flex;gap:10px;margin:14px 0;flex-wrap:wrap}
  .btn{background:var(--bg2);border:1px solid var(--line);color:var(--txt);padding:9px 16px;border-radius:999px;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:6px}
  .btn:hover{border-color:var(--acc)}
  .btn.liked{background:var(--acc);border-color:var(--acc);color:#fff}
  .countdown{position:absolute;right:16px;bottom:16px;background:rgba(0,0,0,.8);padding:10px 16px;border-radius:12px;display:none;align-items:center;gap:10px;font-size:14px;z-index:5}
  .countdown button{background:var(--acc);border:0;color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px}

  .side h3{font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--mut);margin:0 0 12px}
  .side .scard{display:flex;gap:10px;margin-bottom:12px;cursor:pointer;border-radius:10px;padding:6px;transition:background .15s}
  .side .scard:hover{background:var(--bg2)}
  .side .sthumb{flex:0 0 160px;aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:#000}
  .side .sthumb img{width:100%;height:100%;object-fit:cover}
  .side .stitle{font-size:13px;font-weight:600;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .side .ssub{color:var(--mut);font-size:11px;margin-top:4px}

  .empty{color:var(--mut);text-align:center;padding:60px 20px}
  .loader{display:inline-block;width:18px;height:18px;border:2px solid #444;border-top-color:var(--acc);border-radius:50%;animation:sp 1s linear infinite;vertical-align:middle}
  @keyframes sp{to{transform:rotate(360deg)}}
  .mic.rec{background:var(--acc);color:#fff;border-color:var(--acc)}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo" onclick="goHome()" style="cursor:pointer">JN<span>Som</span>Player</div>
    <div class="search">
      <input id="q" placeholder="Buscar vídeos, músicas, desenhos..." autocomplete="off"/>
      <div class="suggest" id="sug"></div>
      <button class="mic" id="mic" title="Buscar por voz">🎤</button>
      <button onclick="doSearch()" title="Buscar">🔍</button>
    </div>
  </div>
  <div class="chips" id="chips"></div>
</header>

<main id="main"></main>

<script>
/* ============ Config ============ */
const PIPED = ["https://api.piped.private.coffee","https://pipedapi.adminforge.de","https://pipedapi.kavin.rocks","https://pipedapi.r4fo.com","https://pipedapi.reallyaweso.me","https://pipedapi.darkness.services"];
const CATEGORIES = ["Em alta","Música","Desenhos","Games","Filmes","Notícias","Esportes","Comédia","Educação","Tecnologia","Receitas","Podcasts"];
let activeCat = "Em alta";
let currentVideoId = null;
let countdownTimer = null;
let player = null;
let nextSuggestions = [];

/* ============ Helpers ============ */
const PROXIES = [
  u => u,                                                  // direto
  u => "https://corsproxy.io/?" + encodeURIComponent(u),   // fallback 1
  u => "https://api.allorigins.win/raw?url=" + encodeURIComponent(u), // fallback 2
  u => "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(u), // fallback 3
];
async function pipedFetch(path){
  for(const base of PIPED){
    const url = base + path;
    for(const wrap of PROXIES){
      try{
        const r = await fetch(wrap(url), { headers: { "Accept":"application/json" }});
        if(r.ok){
          const t = await r.text();
          try { return JSON.parse(t); } catch { /* not json, try next */ }
        }
      }catch(e){}
    }
  }
  throw new Error("Piped indisponível");
}
function idFromUrl(u){ const m = (u||"").match(/(?:v=|\/)([\w-]{11})/); return m?m[1]:null; }
function fmtViews(n){ if(!n||n<0)return ""; if(n>1e9)return (n/1e9).toFixed(1)+"B"; if(n>1e6)return (n/1e6).toFixed(1)+"M"; if(n>1e3)return (n/1e3).toFixed(1)+"K"; return n; }

/* ============ Render chips ============ */
function renderChips(){
  const el = document.getElementById("chips");
  el.innerHTML = CATEGORIES.map(c=>`<div class="chip ${c===activeCat?'active':''}" onclick="pickCat('${c}')">${c}</div>`).join("");
}
function pickCat(c){ activeCat=c; renderChips(); loadHome(); }

/* ============ Home ============ */
async function loadHome(){
  const main = document.getElementById("main");
  main.innerHTML = `<div class="empty"><span class="loader"></span> Carregando ${activeCat}...</div>`;
  try{
    const q = activeCat==="Em alta" ? "em alta brasil" : activeCat;
    const data = await pipedFetch("/search?q="+encodeURIComponent(q)+"&filter=videos");
    const items = (data.items||[]).filter(i=>i.type==="stream");
    main.innerHTML = `<div class="grid">${items.map(cardHtml).join("")}</div>`;
  }catch(e){
    main.innerHTML = `<div class="empty">Não foi possível carregar. Tente novamente.</div>`;
  }
}
function cardHtml(v){
  const id = idFromUrl(v.url);
  return `<div class="card" onclick="openVideo('${id}')">
    <div class="thumb"><img loading="lazy" src="${v.thumbnail}" alt=""/></div>
    <div class="meta">
      <div class="title">${escapeHtml(v.title)}</div>
      <div class="sub">${escapeHtml(v.uploaderName||"")} • ${fmtViews(v.views)} views</div>
    </div></div>`;
}
function escapeHtml(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ============ Search ============ */
async function doSearch(){
  const q = document.getElementById("q").value.trim();
  if(!q) return;
  hideSuggest();
  const main = document.getElementById("main");
  main.innerHTML = `<div class="empty"><span class="loader"></span> Buscando "${escapeHtml(q)}"...</div>`;
  try{
    const data = await pipedFetch("/search?q="+encodeURIComponent(q)+"&filter=videos");
    const items = (data.items||[]).filter(i=>i.type==="stream");
    main.innerHTML = items.length
      ? `<div class="grid">${items.map(cardHtml).join("")}</div>`
      : `<div class="empty">Nada encontrado.</div>`;
  }catch(e){ main.innerHTML = `<div class="empty">Erro na busca.</div>`; }
}

/* ============ Autocomplete ============ */
let sugTimer=null;
document.addEventListener("DOMContentLoaded",()=>{
  const q = document.getElementById("q");
  q.addEventListener("input",()=>{
    clearTimeout(sugTimer);
    const v = q.value.trim();
    if(!v){ hideSuggest(); return; }
    sugTimer = setTimeout(()=>fetchSuggest(v),200);
  });
  q.addEventListener("keydown",e=>{ if(e.key==="Enter") doSearch(); });
  document.addEventListener("click",e=>{ if(!e.target.closest(".search")) hideSuggest(); });

  document.getElementById("mic").addEventListener("click",startMic);

  renderChips();
  loadHome();
});
async function fetchSuggest(q){
  try{
    const data = await pipedFetch("/suggestions?query="+encodeURIComponent(q));
    showSuggest(data||[]);
  }catch(e){ hideSuggest(); }
}
function showSuggest(arr){
  const el = document.getElementById("sug");
  if(!arr.length){ hideSuggest(); return; }
  el.innerHTML = arr.slice(0,8).map(s=>`<div onclick="pickSug('${escapeHtml(s).replace(/'/g,"\\'")}')">🔍 ${escapeHtml(s)}</div>`).join("");
  el.style.display="block";
}
function hideSuggest(){ document.getElementById("sug").style.display="none"; }
function pickSug(s){ document.getElementById("q").value=s; hideSuggest(); doSearch(); }

/* ============ Mic (Web Speech API) ============ */
function startMic(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ alert("Seu navegador não suporta reconhecimento de voz."); return; }
  const r = new SR(); r.lang="pt-BR"; r.interimResults=false;
  const btn = document.getElementById("mic"); btn.classList.add("rec");
  r.onresult = e=>{ document.getElementById("q").value = e.results[0][0].transcript; doSearch(); };
  r.onend = ()=> btn.classList.remove("rec");
  r.onerror = ()=> btn.classList.remove("rec");
  r.start();
}

/* ============ Player ============ */
async function openVideo(id){
  if(!id) return;
  currentVideoId = id;
  window.scrollTo({top:0,behavior:"smooth"});
  const main = document.getElementById("main");
  main.innerHTML = `<div class="empty"><span class="loader"></span> Abrindo vídeo...</div>`;

  let info={}, related=[];
  try{
    info = await pipedFetch("/streams/"+id);
    related = (info.relatedStreams||[]).filter(r=>r.type==="stream").slice(0,15);
  }catch(e){}
  nextSuggestions = related;

  main.innerHTML = `
    <div class="player-wrap">
      <div>
        <div class="yt">
          <div id="player"></div>
          <div class="countdown" id="cd">
            <span>Próximo em <b id="cdNum">3</b>s</span>
            <button onclick="cancelNext()">Cancelar</button>
          </div>
        </div>
        <div class="v-title">${escapeHtml(info.title||"Vídeo")}</div>
        <div class="v-sub">
          <span>${escapeHtml(info.uploader||"")}</span>
          <span>${fmtViews(info.views)} views</span>
        </div>
        <div class="actions">
          <button class="btn" id="likeBtn" onclick="toggleLike()">👍 <span id="likeCount">${fmtViews(info.likes)||"Curtir"}</span></button>
          <button class="btn" onclick="navigator.share?navigator.share({url:'https://youtu.be/${id}'}):navigator.clipboard.writeText('https://youtu.be/${id}')">↗ Compartilhar</button>
          <button class="btn" onclick="goHome()">← Voltar</button>
        </div>
      </div>
      <aside class="side">
        <h3>Sugeridos</h3>
        ${related.map(r=>{
          const rid = idFromUrl(r.url);
          return `<div class="scard" onclick="openVideo('${rid}')">
            <div class="sthumb"><img loading="lazy" src="${r.thumbnail}" alt=""/></div>
            <div><div class="stitle">${escapeHtml(r.title)}</div><div class="ssub">${escapeHtml(r.uploaderName||"")} • ${fmtViews(r.views)} views</div></div>
          </div>`;
        }).join("")}
      </aside>
    </div>`;

  loadYTPlayer(id);
}

function loadYTPlayer(id){
  const mount = ()=>{
    try { if(player && player.destroy) player.destroy(); } catch(_){}
    player = new YT.Player("player",{
      videoId:id,
      host:"https://www.youtube-nocookie.com",
      playerVars:{autoplay:1,rel:0,modestbranding:1,playsinline:1,origin:location.origin},
      events:{ onStateChange: onPlayerStateChange, onError: onPlayerError }
    });
  };
  if(window.YT && window.YT.Player){ mount(); }
  else{
    if(!document.getElementById("ytapi")){
      const s=document.createElement("script"); s.id="ytapi"; s.src="https://www.youtube.com/iframe_api"; document.body.appendChild(s);
    }
    window.onYouTubeIframeAPIReady = mount;
  }
}
function onPlayerStateChange(e){
  if(e.data === YT.PlayerState.ENDED){ startCountdown(); }
  if(e.data === YT.PlayerState.PLAYING){ cancelNext(); }
}
function onPlayerError(e){
  // 101/150/153 = embed bloqueado pelo dono. 2 = id inválido. 100 = removido. 5 = HTML5.
  const code = e && e.data;
  const cur = (player && player.getVideoData && player.getVideoData().video_id) || "";
  const stage = document.getElementById("player");
  if(stage){
    stage.insertAdjacentHTML("afterend",
      `<div id="embedErr" style="margin-top:10px;padding:12px;border:1px solid #2a2a2a;border-radius:10px;background:#141414;font-size:13px;color:#ddd">
         ⚠️ Este vídeo não pode ser reproduzido aqui (código ${code}). O dono bloqueou a incorporação.
         <a href="https://www.youtube.com/watch?v=${cur}" target="_blank" rel="noopener" style="color:#ff2d55;margin-left:6px">Abrir no YouTube ↗</a>
         — pulando para o próximo em <b id="skipN">3</b>s…
       </div>`);
  }
  let n=3;
  const t = setInterval(()=>{
    n--; const el=document.getElementById("skipN"); if(el) el.textContent=n;
    if(n<=0){ clearInterval(t); const er=document.getElementById("embedErr"); if(er) er.remove(); playNext(); }
  },1000);
}
function startCountdown(){
  const cd = document.getElementById("cd"); if(!cd) return;
  cd.style.display="flex";
  let n=3; document.getElementById("cdNum").textContent=n;
  countdownTimer = setInterval(()=>{
    n--; const el=document.getElementById("cdNum"); if(el) el.textContent=n;
    if(n<=0){ cancelNext(); playNext(); }
  },1000);
}
function cancelNext(){
  clearInterval(countdownTimer); countdownTimer=null;
  const cd = document.getElementById("cd"); if(cd) cd.style.display="none";
}
function playNext(){
  const nxt = nextSuggestions[0]; if(!nxt) return;
  const id = idFromUrl(nxt.url); if(id) openVideo(id);
}
function toggleLike(){
  const b=document.getElementById("likeBtn"); b.classList.toggle("liked");
}
function goHome(){ cancelNext(); loadHome(); }
</script>
</body>
</html>
