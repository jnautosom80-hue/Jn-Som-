plugins {
    id 'com.android.application'
}

android {
    namespace 'com.seuusuario.meuappauto'
    compileSdk 34

    defaultConfig {
        applicationId "com.seuusuario.meuappauto"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }
}

// Isso força o projeto do aplicativo a usar as fontes de download corretas e seguras
repositories {
    google()
    mavenCentral()
}
