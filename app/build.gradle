plugins {
    id 'com.android.application'
}

android {
    namespace 'com.seuusuario.meuappauto'
    compileSdk 34

    defaultConfig {
        applicationId "com.seuusuario.meuappauto"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    // Impede o compilador de travar por erros de validação antigos do manifesto
    lint {
        abortOnError false
        checkReleaseBuilds false
    }
}
